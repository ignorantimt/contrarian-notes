{% capture favicon_path %}{{ '/assets/img/favicons' | relative_url }}{% endcapture %}
{% assign favicon_version = '20260718' %}

<link rel="icon" type="image/png" href="{{ favicon_path }}/favicon-96x96.png?v={{ favicon_version }}" sizes="96x96">
<link rel="icon" type="image/svg+xml" href="{{ favicon_path }}/favicon.svg?v={{ favicon_version }}">
<link rel="shortcut icon" href="{{ favicon_path }}/favicon.ico?v={{ favicon_version }}">
<link rel="apple-touch-icon" sizes="180x180" href="{{ favicon_path }}/apple-touch-icon.png?v={{ favicon_version }}">
{% if site.pwa.enabled %}
  <link rel="manifest" href="{{ favicon_path }}/site.webmanifest?v={{ favicon_version }}">
{% endif %}
